name: Netflix CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Display Project Files
        run: ls -R

      - name: Verify Model Files
        run: |
          test -f "model(netflix).pkl"
          test -f "preprocessor(netflix).pkl"

      - name: Run Tests
        run: |
          python test_model.py

      - name: CI Passed
        run: echo "Netflix Recommendation CI Passed Successfully!"assed Successfully!"
