name: Netflix CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Model Files
        run: |
          test -f "model(netflix).pkl"
          test -f "preprocessor(netflix).pkl"

      - name: Run Tests
        run: |
          python test_model.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t nadupuri/netflix-recommendation:latest .

      - name: Push Docker Image
        run: |
          docker push nadupuri/netflix-recommendation:latest

      - name: Success
        run: echo "CI/CD Pipeline Completed Successfully!"
